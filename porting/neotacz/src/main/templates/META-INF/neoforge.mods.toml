license="${mod_license}"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
logoFile="logo.png"
authors="${mod_authors}"
description='''${mod_description}'''

[[mixins]]
config="${mod_id}.mixins.json"

[[accessTransformers]]
file="META-INF/accesstransformer.cfg"

[[dependencies.${mod_id}]]
modId="neoforge"
type="required"
versionRange="[${neo_version},)"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="minecraft"
type="required"
versionRange="${minecraft_version_range}"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="simplebedrockmodel"
type="required"
versionRange="${sbm_version_range}"
ordering="AFTER"
side="BOTH"

[[dependencies.${mod_id}]]
modId="shouldersurfing"
type="optional"
versionRange="${shoulder_surfing_version_range}"
ordering="NONE"
side="CLIENT"

[modproperties.${mod_id}]
catalogueItemIcon="tacz:gun_smith_table"
